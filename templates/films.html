<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<h1>Films</h1>

<p1>Below are all of the current films we have in our collection:</p1>

<div class="film-grid">
    {% for film in films %}
    <div class="film-card">
        <img src="{{ film.image_url }}" alt="{{ film.title }}" class="film-thumbnail">
        <h3>{{ film.title }}</h3>
        <p>Released: {{ film.release_year }}</p>
    </div>
    {% endfor %}
</div>
