<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<h1>Books</h1>

<p1>Below are all of the current books we have in our collection:</p1>

<div class="book-grid">
    {% for book in books %}
    <div class="book-card">
        <img src="{{ book.image_url }}" alt="{{ book.title }}" class="book-thumbnail">
        <h3>{{ book.title }}</h3>
        <p>Author: {{ book.author }}</p>
    </div>
    {% endfor %}
</div>
